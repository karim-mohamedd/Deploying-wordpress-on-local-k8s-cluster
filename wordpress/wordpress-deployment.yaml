apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress
        image: wordpress:latest

        env:
        - name: WORDPRESS_DB_HOST
          value: mysql-service

        - name: WORDPRESS_DB_USER
          value: wpuser

        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password

        - name: WORDPRESS_DB_NAME
          value: wordpress

        volumeMounts:
        - mountPath: /var/www/html
          name: wordpress-storage

      volumes:
      - name: wordpress-storage
        persistentVolumeClaim:
          claimName: wordpress-pvc
